services:
  - type: web
    name: nova-capital-group
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: nova-capital-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: USE_SQLITE
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: nova-capital-db
    databaseName: nova_capital_db
    user: nova_capital_user
    plan: free
    region: oregon
