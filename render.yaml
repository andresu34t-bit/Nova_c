services:
  - type: web
    name: nova-capital-group
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: nova-capital-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true

databases:
  - name: nova-capital-db
    databaseName: nova_capital_db
    user: nova_capital_user
    plan: free
