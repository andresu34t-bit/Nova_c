{% extends 'base.html' %}
{% block title %}404 - Página no encontrada{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--nova-bg-dark);position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,102,255,0.08) 0%,transparent 70%);"></div>
  <div style="text-align:center;position:relative;z-index:1;padding:40px;">
    <div style="font-size:120px;font-weight:900;color:rgba(0,102,255,0.2);font-family:var(--nova-font-mono);line-height:1;margin-bottom:8px;">404</div>
    <div style="font-size:28px;font-weight:700;color:#fff;margin-bottom:12px;">Página no encontrada</div>
    <div style="font-size:15px;color:var(--nova-text-muted);margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto;">La página que buscas no existe o ha sido movida.</div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <a href="/" class="btn-nova btn-nova-primary" style="padding:12px 28px;font-size:14px;"><i class="bi bi-house-fill"></i> Ir al Inicio</a>
      <a href="javascript:history.back()" class="btn-nova btn-nova-ghost" style="padding:12px 28px;font-size:14px;"><i class="bi bi-arrow-left"></i> Volver</a>
    </div>
  </div>
</div>
{% endblock %}
