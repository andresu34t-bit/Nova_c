{% extends 'base_app.html' %}
{% block title %}Retiros{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Retiros</div>
    <div class="page-subtitle">Gestión de fondos</div>
  </div>
  <a href="{% url 'finances:finances' %}" class="btn-nova btn-nova-ghost">
    <i class="bi bi-arrow-left"></i> Volver
  </a>
</div>

<div style="max-width:520px;">
  <div class="nova-card" style="text-align:center;padding:60px 40px;">
    <div style="width:80px;height:80px;background:rgba(255,184,0,0.1);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
      <i class="bi bi-lock-fill" style="font-size:36px;color:var(--nova-warning);"></i>
    </div>
    <h2 style="font-size:22px;font-weight:700;color:#fff;margin-bottom:12px;">Retiros no disponibles</h2>
    <p style="font-size:14px;color:var(--nova-text-muted);line-height:1.7;margin-bottom:28px;">
      Esta es una plataforma de simulación financiera.<br>
      Los retiros de fondos no están habilitados en este modo.
    </p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="{% url 'trading:trading' %}" class="btn-nova btn-nova-primary" style="padding:12px 24px;">
        <i class="bi bi-graph-up-arrow"></i> Ir a Trading
      </a>
      <a href="{% url 'finances:deposit' %}" class="btn-nova btn-nova-success" style="padding:12px 24px;">
        <i class="bi bi-plus-circle-fill"></i> Depositar
      </a>
    </div>
  </div>
</div>
{% endblock %}
